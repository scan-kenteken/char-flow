# npm Trusted Publishing (OIDC) is configured for this workflow filename: ci.yml
name: CI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write # required for npm Trusted Publishing on version tags

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: npm pack --dry-run

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  release:
    needs: test
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v6

      - name: Verify tag matches package.json
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "Tag v${TAG} and package.json (${PKG}) must match"
            exit 1
          fi

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Publish to npm
        run: |
          NAME="$(node -p "require('./package.json').name")"
          VERSION="$(node -p "require('./package.json').version")"
          if npm view "${NAME}@${VERSION}" version --registry=https://registry.npmjs.org >/dev/null 2>&1; then
            echo "${NAME}@${VERSION} is already published on npm; skipping npm publish"
          else
            npm publish --ignore-scripts
          fi
