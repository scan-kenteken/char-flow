# npm Trusted Publishing (OIDC) is configured for this workflow filename: ci.yml
name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

permissions:
  contents: read
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: npm pack --dry-run

  release:
    needs: test
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Verify tag matches VERSION
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          VERSION="$(tr -d '[:space:]' < VERSION)"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$VERSION" ] || [ "$TAG" != "$PKG" ]; then
            echo "Tag v${TAG}, VERSION (${VERSION}), and package.json (${PKG}) must match"
            exit 1
          fi

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Publish to npm
        run: |
          npm ci
          NAME="$(node -p "require('./package.json').name")"
          VERSION="$(node -p "require('./package.json').version")"
          if npm view "${NAME}@${VERSION}" version --registry=https://registry.npmjs.org >/dev/null 2>&1; then
            echo "${NAME}@${VERSION} is already published on npm; skipping"
          else
            npm run typecheck
            npm run build
            npm publish --ignore-scripts
          fi
